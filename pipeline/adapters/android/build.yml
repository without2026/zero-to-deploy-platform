name: Android Build
on:
  workflow_call:
    inputs:
      build_type:
        description: "Build type: debug or release"
        required: false
        default: "release"
        type: string

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Build app bundle
        working-directory: BeCalmv3/android
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew bundleDebug
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: BeCalmv3/android/app/build/outputs/bundle/**/*.aab

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify API builds
        working-directory: BeCalmv3/api
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          python -c "from app.main import app; print('[PASS] API imports ok')"
