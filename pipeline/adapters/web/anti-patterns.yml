test_anti_patterns:
  - pattern: "assert True"
    description: "Vacuous assertion (Python)"
  - pattern: "test.skip"
    description: "Unconditional test skip (JS/TS)"
  - pattern: "xit("
    description: "Jasmine disabled test"
  - pattern: "xdescribe("
    description: "Jasmine disabled suite"
  - pattern: "# assert"
    description: "Commented-out assertion (Python)"
  - pattern: "// assert"
    description: "Commented-out assertion (JS/TS)"
  - pattern: "expect(true).toBe(true)"
    description: "Vacuous assertion (Jest)"
  - pattern: "test.todo("
    description: "Unimplemented test placeholder (Vitest/Jest)"
  - pattern: ".skip("
    description: "Skipped test (Vitest/Jest)"
