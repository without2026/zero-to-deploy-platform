# Scenario Generator — Timing D (Review-Driven Test Generation)
#
# Triggered when a PR is labeled 'missing-tests'.
# Reads the Claude review artifact's missing_tests field,
# generates new tests + spec entries, and commits them to the PR branch.

name: CI Scenario Generator

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  generate-tests:
    if: github.event.label.name == 'missing-tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install tools
        run: pip install -q pyyaml

      - name: Download Claude review artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-review.yml
          pr: ${{ github.event.pull_request.number }}
          name: claude-review
          path: claude-review
        continue-on-error: true

      - name: Extract missing_tests
        id: extract
        run: |
          python3 << 'PYEOF'
          import json, pathlib, os

          review_path = pathlib.Path("claude-review/claude-review.json")
          missing = []
          if review_path.exists():
              data = json.loads(review_path.read_text())
              missing = data.get("missing_tests", [])

          pathlib.Path("missing-tests.json").write_text(json.dumps(missing, indent=2))
          count = len(missing)
          print(f"[INFO] {count} missing test(s) to generate")

          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"count={count}\n")
          PYEOF

      - name: Collect project context
        if: steps.extract.outputs.count != '0'
        run: |
          python3 << 'PYEOF'
          import json, pathlib, yaml

          config = yaml.safe_load(pathlib.Path(".pipeline/platform.yml").read_text())
          project_root = config.get("project_root", ".")
          spec_dir = config.get("spec", {}).get("dir", ".spec")
          comment_patterns = config.get("spec", {}).get("comment_patterns", {})
          test_file_patterns = config.get("spec", {}).get("test_file_patterns", {})
          ci_adapter = config.get("ci", {}).get("adapter", "electron")

          existing_specs = {}
          sd = pathlib.Path(spec_dir)
          if sd.exists():
              for sf in sd.glob("*.spec.yml"):
                  data = yaml.safe_load(sf.read_text())
                  for b in data.get("behaviors", []):
                      bid = b.get("id")
                      if bid:
                          existing_specs[bid] = b.get("description", "")

          max_ids = {}
          for sid in existing_specs:
              parts = sid.rsplit("-", 1)
              if len(parts) == 2:
                  prefix, num = parts[0], int(parts[1])
                  max_ids[prefix] = max(max_ids.get(prefix, 0), num)

          context = {
              "project_root": project_root,
              "spec_dir": spec_dir,
              "comment_patterns": comment_patterns,
              "test_file_patterns": test_file_patterns,
              "ci_adapter": ci_adapter,
              "existing_spec_ids": list(existing_specs.keys()),
              "max_spec_ids": max_ids,
              "spec_schema": ".pipeline/core/spec-schema.json",
              "spec_template": ".spec/_template.spec.yml",
          }
          pathlib.Path("gen-context.json").write_text(json.dumps(context, indent=2))
          PYEOF

      - name: Generate tests + specs via Claude
        if: steps.extract.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Timing D Scenario Generator.

            ## Context files
            - missing-tests.json: array of { file, description, suggested_spec_id? }
            - gen-context.json: project config, existing spec IDs, naming conventions, comment_patterns, test_file_patterns, ci_adapter
            - .spec/_template.spec.yml: spec template
            - .pipeline/core/spec-schema.json: spec JSON Schema

            ## Kotlin / Android
            If gen-context.json has ci_adapter "android" or test_file_patterns.kotlin: place new Kotlin tests under android/**/src/test/ or android/**/src/androidTest/ per gen-context test_file_patterns; use the kotlin comment pattern (usually `// spec: ID`).

            ## Your task
            For each entry in missing-tests.json:

            1. **Create or update the spec file**:
               - Add a new behavior entry to `.spec/{module}.spec.yml`
               - If the spec file doesn't exist, create it from the template
               - Use `source: review-discovery` (Timing D)
               - Generate a unique ID using the module prefix (check gen-context.json for max IDs)
               - Follow the spec-schema.json for required fields based on behavior type

            2. **Create the test file**:
               - Write a minimal but meaningful test
               - Include the spec reference comment (e.g., `# spec: MOD-123` for Python)
               - Use the comment pattern from gen-context.json
               - Place the test in the correct directory per project convention

            3. **Rules**:
               - Do NOT modify existing tests
               - Do NOT modify production code
               - Only add new spec entries and new test functions/files
               - Each test must have exactly one spec reference

            After completion, create gen-report.json:
            {
              "generated": [{ "spec_id": "...", "test_file": "...", "description": "..." }]
            }
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 15
            --max-budget-usd 2.00

      - name: Check for generated files
        if: steps.extract.outputs.count != '0'
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "[INFO] Generated files:"
            git diff --stat
            git ls-files --others --exclude-standard
          fi

      - uses: actions/setup-node@v4
        if: steps.extract.outputs.count != '0' && steps.check.outputs.has_changes == 'true'
        with:
          node-version: "20"

      - name: Install verification deps
        if: steps.extract.outputs.count != '0' && steps.check.outputs.has_changes == 'true'
        run: |
          pip install -q pyyaml jsonschema pytest

      - name: Validate generated spec/test files
        if: steps.extract.outputs.count != '0' && steps.check.outputs.has_changes == 'true'
        run: python .github/scripts/validate_generated_changes.py

      - name: Verify generated tests
        if: steps.extract.outputs.count != '0' && steps.check.outputs.has_changes == 'true'
        run: |
          ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          CHANGED="$(git diff --name-only; git ls-files --others --exclude-standard)"

          if printf '%s\n' "$CHANGED" | rg -q "^${ROOT}/api/tests/"; then
            python -m pip install -q -r "$ROOT/api/requirements.txt" 2>/dev/null || true
            python -m pip install -q pytest pytest-timeout
            CHANGED_TESTS=$(printf '%s\n' "$CHANGED" | rg "^${ROOT}/api/tests/.*\\.py$")
            if [ -n "$CHANGED_TESTS" ]; then
              (cd "$ROOT/api" && pytest -q --maxfail=1 $(printf '%s\n' "$CHANGED_TESTS" | sed "s#^${ROOT}/api/##"))
            fi
          fi

          if printf '%s\n' "$CHANGED" | rg -q "^${ROOT}/sidecar/tests/"; then
            python -m pip install -q -r "$ROOT/sidecar/requirements.txt" 2>/dev/null || true
            python -m pip install -q pytest pytest-timeout
            CHANGED_TESTS=$(printf '%s\n' "$CHANGED" | rg "^${ROOT}/sidecar/tests/.*\\.py$")
            if [ -n "$CHANGED_TESTS" ]; then
              (cd "$ROOT/sidecar" && pytest -q --maxfail=1 $(printf '%s\n' "$CHANGED_TESTS" | sed "s#^${ROOT}/sidecar/##"))
            fi
          fi

          if printf '%s\n' "$CHANGED" | rg -q "^${ROOT}/desktop/"; then
            (cd "$ROOT/desktop" && npm ci && npm run build)
          fi

          if printf '%s\n' "$CHANGED" | rg -q "^${ROOT}/android/.*\\.kt$"; then
            echo "[INFO] Verifying Android (Kotlin) generated tests"
            if [ -d "$ROOT/android" ] && [ -f "$ROOT/android/gradlew" ]; then
              chmod +x "$ROOT/android/gradlew"
              (cd "$ROOT/android" && ./gradlew testDebugUnitTest --no-daemon --console=plain)
            fi
          fi

      - name: Commit generated tests
        if: steps.extract.outputs.count != '0' && steps.check.outputs.has_changes == 'true'
        env:
          # Pass untrusted ref through env to avoid shell injection (CWE-94).
          # actionlint[expression] enforces this pattern.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Defensive validation: branch names only contain [A-Za-z0-9._/-].
          if ! printf '%s' "$HEAD_REF" | grep -qE '^[A-Za-z0-9._/-]+$'; then
            echo "::error::refusing to push to untrusted head_ref: $HEAD_REF"
            exit 1
          fi
          git config user.name "claude-scenario-gen[bot]"
          git config user.email "claude-scenario-gen[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$(cat <<'EOF'
          test(auto): generate missing tests (Timing D)

          Review-driven test generation via ci-scenario-gen.yml.
          Source: review-discovery. See gen-report.json artifact.
          EOF
          )"
          git push origin "HEAD:$HEAD_REF"

      - name: Remove missing-tests label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'missing-tests',
              });
            } catch (e) {
              core.info(`Label removal skipped: ${e.message}`);
            }

      - name: Upload generation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-gen-report
          path: |
            gen-report.json
            missing-tests.json
            gen-context.json
          if-no-files-found: ignore
