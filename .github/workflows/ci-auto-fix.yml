# Auto-Fix Loop — 5-Step Judgment Engine
#
# Triggered when ci-review.yml fails. Uses the spec oracle + 5-step judgment
# to determine whether to fix code or fix test, then commits the minimal fix.
#
# Loop prevention (3-layer):
#   1. Branch prefix guard: skip branches starting with 'claude-fix-'
#   2. Iteration counter: commit message [fix N/5], N >= 5 -> stop + label
#   3. Budget cap: --max-budget-usd 2.00 per run

name: CI Auto-Fix Loop

on:
  # workflow_call: invoked by consumer pr.yml with `if: failure()` after
  # tests/gates/review fail. Consumer owns the "should we auto-fix" decision.
  workflow_call:
    inputs:
      platform_ref:
        description: "Ref of zero-to-deploy-platform for runtime scripts (must match uses: tag)."
        required: true
        type: string
      branch:
        description: "PR head branch to check out and fix. Usually github.head_ref."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read
  # OIDC for claude-code-action authentication
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  # MAX_ITERATIONS bounds the runaway-comment count — each auto-fix run
  # posts one PR comment with Claude's proposal; if the CTO applies and
  # CI fails again, subsequent runs append. After MAX_ITERATIONS comments,
  # the workflow labels `needs-human` and stops proposing.
  MAX_ITERATIONS: 5

jobs:
  auto-fix:
    # Skip self-authored auto-fix branches to prevent infinite loop.
    if: ${{ !startsWith(inputs.branch, 'claude-fix-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: without2026/zero-to-deploy-platform
          ref: ${{ inputs.platform_ref }}
          path: .ztd-platform

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        # pyyaml for the Python context-collection step below.
        # No Java/Node setup is needed anymore — the human-in-loop flow does
        # not auto-apply fixes, so there's no in-CI verification to run.
        run: pip install -q pyyaml

      - name: Guard — check iteration count
        id: guard
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          ITER=0
          if [[ "$LAST_MSG" =~ \[fix\ ([0-9]+)/ ]]; then
            ITER="${BASH_REMATCH[1]}"
          fi
          echo "iteration=$ITER" >> "$GITHUB_OUTPUT"

          if [ "$ITER" -ge "$MAX_ITERATIONS" ]; then
            echo "max_reached=true" >> "$GITHUB_OUTPUT"
            echo "[STOP] Max iterations ($MAX_ITERATIONS) reached"
          else
            echo "max_reached=false" >> "$GITHUB_OUTPUT"
            NEXT=$((ITER + 1))
            echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          fi

      - name: Label needs-human if max iterations
        if: steps.guard.outputs.max_reached == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ inputs.branch }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            for (const pr of prs.data) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-human'],
              });
            }

      - name: Collect failure context
        if: steps.guard.outputs.max_reached == 'false'
        id: collect
        run: |
          python3 << 'PYEOF'
          import json, pathlib, re, yaml, os

          config_path = pathlib.Path(".pipeline/platform.yml")
          config = yaml.safe_load(config_path.read_text()) if config_path.exists() else {}
          project_root = config.get("project_root", ".")

          spec_dir = pathlib.Path(config.get("spec", {}).get("dir", ".spec"))
          specs = {}
          if spec_dir.exists():
              for sf in spec_dir.glob("*.spec.yml"):
                  data = yaml.safe_load(sf.read_text())
                  for b in data.get("behaviors", []):
                      bid = b.get("id")
                      if bid:
                          specs[bid] = {**b, "_file": str(sf)}

          spec_cfg = config.get("spec", {})
          context = {
              "project_root": project_root,
              "platform": config.get("platform", "unknown"),
              "ci_adapter": config.get("ci", {}).get("adapter", "electron"),
              "specs": specs,
              "spec_count": len(specs),
              "authority_file": ".ztd-platform/pipeline/core/authority.yml",
              "judgment_prompt": ".ztd-platform/pipeline/core/judgment-prompt.md",
              "spec_comment_patterns": spec_cfg.get("comment_patterns", {}),
              "spec_test_file_patterns": spec_cfg.get("test_file_patterns", {}),
          }

          pathlib.Path("fix-context.json").write_text(json.dumps(context, indent=2, default=str))
          print(f"[INFO] Collected context: {len(specs)} specs, platform={context['platform']}")

          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"has_specs={'true' if specs else 'false'}\n")
          PYEOF

      - name: Download failed workflow logs
        if: steps.guard.outputs.max_reached == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // workflow_call context: this job is a sibling of the failed jobs
            // in the consumer's caller run. context.runId points to that run.
            const runId = context.runId;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              filter: 'latest',
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const summaries = [];

            for (const job of failedJobs.slice(0, 3)) {
              try {
                const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                const logText = typeof logs.data === 'string' ? logs.data : '';
                // Keep the LAST ~400 lines, up to 16KB. The actual AssertionError
                // / stack trace almost always sits near the end of a gradle/pytest
                // log; the earlier 100-line / 4KB window was too aggressive and
                // cut off the assertion message before the LLM saw it.
                const tail = logText.split('\n').slice(-400).join('\n');
                summaries.push({
                  job_name: job.name,
                  conclusion: job.conclusion,
                  log_tail: tail.length > 16000 ? tail.slice(-16000) : tail,
                });
              } catch (e) {
                summaries.push({
                  job_name: job.name,
                  conclusion: job.conclusion,
                  log_tail: `(failed to fetch logs: ${e.message})`,
                });
              }
            }

            fs.writeFileSync('failed-jobs.json', JSON.stringify(summaries, null, 2));
            core.info(`Collected logs from ${summaries.length} failed job(s)`);

      - name: Claude fix proposal (human-in-the-loop)
        if: steps.guard.outputs.max_reached == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Claude analyzes the failure and writes fix-proposal.json. This
        # step NEVER applies the change — the CTO cross-validates the
        # proposal (e.g., via /codex:review locally) and decides whether to
        # apply manually. See pipeline/core/auto_fix_judge.py.
        run: python3 .ztd-platform/pipeline/core/auto_fix_judge.py

      - name: Post proposal + label for CTO cross-validation
        if: steps.guard.outputs.max_reached == 'false'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ inputs.branch }}
          ITER: ${{ steps.guard.outputs.next }}
          MAX_ITER: ${{ env.MAX_ITERATIONS }}
        with:
          script: |
            const fs = require('fs');
            const branch = process.env.BRANCH;
            const iter = process.env.ITER;
            const maxIter = process.env.MAX_ITER;

            let proposal = null;
            try {
              proposal = JSON.parse(fs.readFileSync('fix-proposal.json', 'utf8'));
            } catch (e) {
              core.setFailed(`fix-proposal.json missing or invalid: ${e.message}`);
              return;
            }

            const verdict = proposal.verdict || 'escalate';
            const confidence = proposal.confidence ?? 0;
            const specId = proposal.spec_id || 'none';
            const reasoning = proposal.reasoning || '(no reasoning provided)';
            const fix = proposal.fix;

            // Build a ready-to-paste Codex cross-validation prompt. The CTO
            // copies the whole block below into their Claude Code session;
            // /codex:adversarial-review accepts custom focus text (unlike
            // /codex:review which is built-in-only).
            const codexPrompt = [
              `Cross-validate this auto-fix proposal from Claude for a failing CI PR.`,
              ``,
              `Target file: ${fix.file}`,
              `Spec being violated: ${specId}`,
              `Confidence Claude assigned: ${confidence}`,
              ``,
              `Claude's reasoning:`,
              reasoning,
              ``,
              `Proposed diff:`,
              '```diff',
              '- ' + (fix.before || '').split('\n').join('\n- '),
              '+ ' + (fix.after || '').split('\n').join('\n+ '),
              '```',
              ``,
              `Your task — answer these five questions concretely:`,
              `1. Open the ACTUAL current file content of ${fix.file}. Does Claude's 'before' string match what is really there? (Claude noted uncertainty because it cannot read the file directly; you can.)`,
              `2. If 'before' does not match exactly, what is the correct string to replace?`,
              `3. Is the 'after' value the right destination per spec ${specId}?`,
              `4. Are there other files that should change together for consistency?`,
              `5. Verdict: APPROVE as-is / APPROVE with corrected 'before' / REJECT (explain).`,
              ``,
              `Be terse. Output five numbered answers, nothing else.`,
            ].join('\n');

            let body;
            if (verdict === 'propose_fix' && fix) {
              body = [
                `### 🤖 Auto-fix proposal (iteration ${iter}/${maxIter}) — needs CTO cross-validation`,
                '',
                `**Verdict**: \`${verdict}\` · **Confidence**: \`${confidence}\` · **Spec**: \`${specId}\``,
                '',
                '**Reasoning**',
                '> ' + reasoning.replace(/\n/g, '\n> '),
                '',
                `**Proposed change** — \`${fix.file}\``,
                '',
                '```diff',
                '- ' + (fix.before || '').split('\n').join('\n- '),
                '+ ' + (fix.after || '').split('\n').join('\n+ '),
                '```',
                '',
                '---',
                '#### Cross-validate via Codex (one-command)',
                '',
                'Paste this into your Claude Code session (it invokes `/codex:adversarial-review` with a focused prompt built from this proposal):',
                '',
                '```',
                '/codex:adversarial-review ' + JSON.stringify(codexPrompt),
                '```',
                '',
                'Codex will read the actual file content (something Claude could only guess at) and return a five-point verdict. Apply the diff yourself if approved; comment here with corrections if not.',
                '',
                '---',
                '**Alternative manual path**: pull this branch, eyeball the diff, apply by hand, commit, push.',
                '',
                `*Full model output attached in the \`auto-fix-report\` artifact.*`,
              ].join('\n');
            } else {
              body = [
                `### 🤖 Auto-fix: escalate (iteration ${iter}/${maxIter})`,
                '',
                `**Confidence**: \`${confidence}\` — not high enough to propose a fix.`,
                '',
                '**Why the model escalated**',
                '> ' + reasoning.replace(/\n/g, '\n> '),
                '',
                '`needs-human` label applied. Fix manually; see the `auto-fix-report` artifact for the full analysis.',
              ].join('\n');
            }

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
              const labels = (verdict === 'propose_fix')
                ? ['cross-validate-needed']
                : ['needs-human'];
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels,
              });
            }

      - name: Upload fix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-report
          path: |
            fix-proposal.json
            fix-context.json
            failed-jobs.json
          if-no-files-found: ignore
