name: Electron Build

on:
  workflow_call:
    inputs:
      build_target:
        description: "Build target: win, mac, linux, or all"
        required: false
        default: "all"
        type: string
      require_signing:
        description: "Fail protected targets when signing secrets are missing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.config.outputs.root }}
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml
          PROJECT_ROOT=$(python3 -c "import yaml; print(yaml.safe_load(open('.pipeline/platform.yml')).get('project_root', '.'))")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"
      - name: Compute filtered matrix
        id: matrix
        env:
          BUILD_TARGET: ${{ inputs.build_target }}
        run: |
          ALL='[{"os":"ubuntu-latest","target":"linux"},{"os":"windows-latest","target":"win"},{"os":"macos-14","target":"mac"}]'
          case "$BUILD_TARGET" in
            all)   JSON="$ALL" ;;
            linux) JSON='[{"os":"ubuntu-latest","target":"linux"}]' ;;
            win)   JSON='[{"os":"windows-latest","target":"win"}]' ;;
            mac)   JSON='[{"os":"macos-14","target":"mac"}]' ;;
            *)     echo "::error::invalid build_target: $BUILD_TARGET (expected all|linux|win|mac)"; exit 1 ;;
          esac
          echo "json={\"include\":$JSON}" >> "$GITHUB_OUTPUT"

  build-desktop:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: ${{ needs.setup.outputs.root }}/desktop
        run: npm ci

      - name: Build renderer
        working-directory: ${{ needs.setup.outputs.root }}/desktop
        run: npm run build

      - name: Verify signing prerequisites
        if: inputs.require_signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$TARGET" = "win" ] && { [ -z "$CSC_LINK" ] || [ -z "$CSC_KEY_PASSWORD" ]; }; then
            echo "::error::Windows signing is required but CSC_LINK/CSC_KEY_PASSWORD is missing"
            exit 1
          fi
          if [ "$TARGET" = "mac" ] && { [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; }; then
            echo "::error::macOS signing/notarization is required but Apple signing secrets are missing"
            exit 1
          fi

      - name: Package installer
        working-directory: ${{ needs.setup.outputs.root }}/desktop
        run: npx electron-builder --${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            ${{ needs.setup.outputs.root }}/desktop/dist/*.exe
            ${{ needs.setup.outputs.root }}/desktop/dist/*.dmg
            ${{ needs.setup.outputs.root }}/desktop/dist/*.AppImage
            ${{ needs.setup.outputs.root }}/desktop/dist/*.deb
          if-no-files-found: error

  build-sidecar:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps & build sidecar
        working-directory: ${{ needs.setup.outputs.root }}
        run: |
          pip install pyinstaller
          pip install -r sidecar/requirements.txt 2>/dev/null || true
          pyinstaller --onefile --name becalm-sidecar sidecar/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: ${{ needs.setup.outputs.root }}/dist/becalm-sidecar*
          if-no-files-found: error
