name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: BeCalmv2/frontend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mac.txt

      - name: Build Swift ContextKit
        working-directory: BeCalmv2/native/contextkit
        run: |
          swift build -c release
          ls -la .build/release/becalm-contextkit

      - name: Build sidecar binary
        working-directory: BeCalmv2/frontend
        run: |
          pyinstaller sidecar-mac.spec --noconfirm
          ls -la dist/becalm-sidecar/

      - name: Smoke test sidecar binary
        working-directory: BeCalmv2/frontend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Starting sidecar for smoke test..."
          ./dist/becalm-sidecar/becalm-sidecar --port 19876 --backend-url http://localhost:9999 --shell-token test &
          SIDECAR_PID=$!
          sleep 5
          if kill -0 $SIDECAR_PID 2>/dev/null; then
            echo "Sidecar alive after 5s (PID $SIDECAR_PID) — OK"
            kill $SIDECAR_PID || true
          else
            echo "ERROR: Sidecar exited prematurely. Stderr:"
            wait $SIDECAR_PID 2>/dev/null || true
            exit 1
          fi

      - name: Move sidecar + ContextKit to expected location
        run: |
          mkdir -p BeCalmv2/dist/sidecar/contextkit
          cp -R BeCalmv2/frontend/dist/becalm-sidecar/* BeCalmv2/dist/sidecar/
          cp BeCalmv2/native/contextkit/.build/release/becalm-contextkit BeCalmv2/dist/sidecar/contextkit/
          ls -la BeCalmv2/dist/sidecar/contextkit/

      - name: Create config.json
        working-directory: BeCalmv2/desktop-shell
        env:
          CFG_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CFG_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CFG_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CFG_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CFG_NOTION_CLIENT_ID: ${{ secrets.NOTION_CLIENT_ID }}
          CFG_NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET }}
          CFG_GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          CFG_GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          CFG_JIRA_CLIENT_ID: ${{ secrets.JIRA_CLIENT_ID }}
          CFG_JIRA_CLIENT_SECRET: ${{ secrets.JIRA_CLIENT_SECRET }}
          CFG_LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          CFG_LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}
          CFG_ASANA_CLIENT_ID: ${{ secrets.ASANA_CLIENT_ID }}
          CFG_ASANA_CLIENT_SECRET: ${{ secrets.ASANA_CLIENT_SECRET }}
          CFG_ADMIN_PUBLIC_KEY_PEM: ${{ secrets.ADMIN_PUBLIC_KEY_PEM }}
          CFG_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ../../.github/scripts/create-config.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Electron dependencies
        working-directory: BeCalmv2/desktop-shell
        run: npm ci

      - name: Build macOS DMG
        working-directory: BeCalmv2/desktop-shell
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCalm-macOS-dmg
          path: BeCalmv2/desktop-shell/dist/*.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BeCalmv2/desktop-shell/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
