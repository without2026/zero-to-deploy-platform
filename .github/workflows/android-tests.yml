# Android test suite.
# Reads .pipeline/platform.yml for project_root.

name: Android Tests

on:
  workflow_call:

jobs:
  read-config:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.config.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

  unit-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Unit tests
        working-directory: ${{ needs.read-config.outputs.root }}/android
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew testDebugUnitTest --no-daemon --console=plain

  instrumented-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Espresso tests (API 33 emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: cd ${{ needs.read-config.outputs.root }}/android && chmod +x ./gradlew 2>/dev/null; ./gradlew connectedDebugAndroidTest

  backend-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend tests (optional Python API)
        run: |
          ROOT="${{ needs.read-config.outputs.root }}"
          if [ ! -f "$ROOT/api/requirements.txt" ]; then
            echo "[INFO] No api/requirements.txt — skipping backend pytest (Kotlin-only app OK)"
            exit 0
          fi
          pip install --upgrade pip
          pip install -r "$ROOT/api/requirements.txt" 2>/dev/null || true
          pip install pytest pytest-timeout 2>/dev/null || true
          if [ ! -d "$ROOT/api/tests" ]; then
            echo "[INFO] No api/tests — skipping backend pytest"
            exit 0
          fi
          (cd "$ROOT/api" && pytest -xvs tests/ --timeout=60)
