# Android test suite.
# Reads .pipeline/platform.yml for project_root.
#
# v0.1.0-alpha notes (PR 3c-2):
#   - /android path suffix removed.
#   - Gradle-wrapper fallback: if consumer repo lacks gradlew, download gradle
#     8.7 at runtime and use it directly. Consumers SHOULD check in a wrapper;
#     this fallback exists so the smoke engine can progress past the halt.

name: Android Tests

on:
  workflow_call:

env:
  GRADLE_FALLBACK_VERSION: "8.7"

jobs:
  read-config:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.config.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

  unit-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Resolve gradle binary
        id: gradle
        working-directory: ${{ needs.read-config.outputs.root }}
        run: |
          if [ -x ./gradlew ]; then
            echo "bin=./gradlew" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::gradlew missing — downloading gradle $GRADLE_FALLBACK_VERSION as fallback"
            curl -fsSL -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_FALLBACK_VERSION}-bin.zip"
            unzip -q /tmp/gradle.zip -d /opt
            echo "bin=/opt/gradle-${GRADLE_FALLBACK_VERSION}/bin/gradle" >> "$GITHUB_OUTPUT"
          fi
      - name: Unit tests
        working-directory: ${{ needs.read-config.outputs.root }}
        run: ${{ steps.gradle.outputs.bin }} testDebugUnitTest --no-daemon --console=plain

  instrumented-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Check gradle wrapper presence
        id: check_wrapper
        working-directory: ${{ needs.read-config.outputs.root }}
        run: |
          if [ -x ./gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::gradlew missing — instrumented tests skipped. Consumers SHOULD commit a gradle wrapper."
          fi
      - name: Espresso tests (API 33 emulator)
        if: steps.check_wrapper.outputs.present == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: cd ${{ needs.read-config.outputs.root }} && chmod +x ./gradlew; ./gradlew connectedDebugAndroidTest

  backend-tests:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Backend tests (optional Python API)
        run: |
          ROOT="${{ needs.read-config.outputs.root }}"
          if [ ! -f "$ROOT/api/requirements.txt" ]; then
            echo "[INFO] No api/requirements.txt — skipping backend pytest (Kotlin-only app OK)"
            exit 0
          fi
          pip install --upgrade pip
          pip install -r "$ROOT/api/requirements.txt" 2>/dev/null || true
          pip install pytest pytest-timeout 2>/dev/null || true
          if [ ! -d "$ROOT/api/tests" ]; then
            echo "[INFO] No api/tests — skipping backend pytest"
            exit 0
          fi
          (cd "$ROOT/api" && pytest -xvs tests/ --timeout=60)
