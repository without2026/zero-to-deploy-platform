# Android deterministic gates.
# Reads .pipeline/platform.yml for project_root.
#
# v0.1.0-alpha note (PR 3c-2):
#   - /android path suffix removed (v3 legacy; modern AGP has gradle at project_root).
#   - Core scripts (spec-coverage.py, assert-guard.py, perf-check.sh) are now
#     fetched from this platform repo at runtime via a second checkout, since
#     Step 1 of the 3-layer migration moved them out of consumer repos.

name: Android Deterministic Gates

on:
  workflow_call:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve platform ref from workflow_ref
        id: platform_ref
        # github.workflow_ref: <owner>/<repo>/.github/workflows/<file>@<ref>
        # where <ref> is refs/heads/<branch>, refs/tags/<tag>, or a full SHA.
        # Consumers pinning @vX.Y.Z get matching scripts automatically.
        run: |
          REF="${{ github.workflow_ref }}"
          TAIL="${REF##*@}"
          TAIL="${TAIL#refs/heads/}"
          TAIL="${TAIL#refs/tags/}"
          echo "ref=${TAIL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved platform ref: ${TAIL}"

      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: without2026/zero-to-deploy-platform
          ref: ${{ steps.platform_ref.outputs.ref }}
          path: .ztd-platform

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install pyyaml detect-secrets

      - name: Read project_root
        id: config
        run: |
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Spec coverage
        run: python .ztd-platform/pipeline/core/spec-coverage.py

      - name: Assert guard
        run: python .ztd-platform/pipeline/core/assert-guard.py

      - name: Secret detection
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan > .secrets.baseline
            echo "[WARN] Baseline created"
          fi

      - name: Gradle dependency check
        working-directory: ${{ steps.config.outputs.root }}
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew dependencyCheckAnalyze
          else
            echo "::warning::gradlew not present — dependencyCheckAnalyze skipped"
          fi

      - name: Android Lint (security + a11y)
        working-directory: ${{ steps.config.outputs.root }}
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew lint
          else
            echo "::warning::gradlew not present — lint skipped"
          fi

      - name: APK size check
        # perf-check.sh expects CWD = repo root (find paths start with
        # `${project_root}/build/...`). Do NOT override working-directory.
        # Also: the script hard-codes `app/build/...` — when project_root !=
        # "app", consumers should either (a) set project_root = "app" or
        # (b) wait for the v0.1.0 refactor of perf-check.sh to accept
        # PROJECT_ROOT env var.
        env:
          PROJECT_ROOT: ${{ steps.config.outputs.root }}
        run: bash "${GITHUB_WORKSPACE}/.ztd-platform/pipeline/adapters/android/perf-check.sh"
