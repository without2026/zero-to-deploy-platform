# Android deterministic gates.
# Reads .pipeline/platform.yml for project_root.

name: Android Deterministic Gates

on:
  workflow_call:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install pyyaml detect-secrets

      - name: Read project_root
        id: config
        run: |
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Spec coverage
        run: python .pipeline/core/spec-coverage.py

      - name: Assert guard
        run: python .pipeline/core/assert-guard.py

      - name: Secret detection
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan > .secrets.baseline
            echo "[WARN] Baseline created"
          fi

      - name: Gradle dependency check
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew dependencyCheckAnalyze

      - name: Android Lint (security + a11y)
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew lint

      - name: APK size check
        working-directory: ${{ steps.config.outputs.root }}/android
        run: bash ../../.pipeline/adapters/android/perf-check.sh
